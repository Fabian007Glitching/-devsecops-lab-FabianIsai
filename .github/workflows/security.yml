name: Pipeline de Seguridad DevSecOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ══ ETAPA 1: SAST con Semgrep ══
  sast:
    name: 'SAST - Semgrep'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Ejecutar analisis SAST
        run: |
          # Generamos el JSON para el reporte descargable
          semgrep --config p/python --config p/owasp-top-ten --config p/secrets --config p/sql-injection --json --output=semgrep-results.json Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/ || true
          # Mostramos el resultado visual en la consola
          semgrep --config p/python --config p/owasp-top-ten --config p/secrets --config p/sql-injection Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/

      - name: Guardar resultados SAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  # ══ ETAPA 2: Analisis de dependencias (SCA) ══
  sca:
    name: 'SCA - pip-audit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar y ejecutar pip-audit
        run: |
          pip install pip-audit
          # Generamos el JSON de auditoria
          pip-audit -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt --format=json --output=audit-report.json || true
          # Mostramos el reporte en texto para la consola
          echo '--- Reporte de CVEs ---'
          pip-audit -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt

      - name: Guardar reporte de auditoria
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: audit-report.json

  # ══ ETAPA 3: Tests ══
  tests:
    name: 'Tests - pytest'
    runs-on: ubuntu-latest
    needs: [sast, sca]
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/app/requirements.txt
          pip install pytest

      - name: Ejecutar tests
        run: pytest Unidad_3_Seguridad_en_Aplicaciones_y_Datos/devsecops-lab/tests/ -v

  # ══ ESTADO FINAL ══
  pipeline-status:
    name: 'Estado final del pipeline'
    runs-on: ubuntu-latest
    needs: [sast, sca, tests]
    if: always()
    steps:
      - name: Resumen
        run: |
          echo 'SAST:         ${{ needs.sast.result }}'
          echo 'Dependencias: ${{ needs.sca.result }}'
          echo 'Tests:        ${{ needs.tests.result }}'
